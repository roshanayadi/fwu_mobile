    <script type="text/javascript">
        function showMessage(title, message, event, closedEventHandler) {
            if (title != null && message != null) {
                setTimeout(function () {
                    toastr.options = {
                        closeButton: true,
                        progressBar: true,
                        showMethod: 'slideDown',
                        timeOut: 4000,
                        onHidden: closedEventHandler
                    };
                    switch (event) {
                        case 'success':
                            toastr.success(message, title);
                            break;
                        case 'error':
                            toastr.error(message, title);
                            break;
                        default:
                            toastr.info(message, title);
                            break;
                    }

                }, 1000);
            }
        }

        $(function () {
            $('#frm').validate({
                rules: {
                    UserName: {
                        required: true
                    }
                },
                messages: {
                    UserName: {
                        required: 'User Name is required.'
                    }
                }
            });


            $("#btnLogin").click(function (e) {
                if (!$('#frm').valid()) {
                    return false;
                }
                var data = $('#frm').serializeObject();

                postJSON($('#frm').attr('action'), data, function (resp) {
                    if (resp.IsSuccess) {
                        window.location = '/Redirect/Index';
                        //showMessage('Login', 'User Authenticated Successfully.', 'success', function () {
                        //});
                    } else {
                        showMessage('Login', resp.Message, 'error', function () {
                        });
                    }
                }, { blockUI: true });
